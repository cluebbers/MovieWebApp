{% extends "base.html" %}
{% block content %}
<h1>Users</h1>
<ul class="user-list">
    {% for user in users %}
    <li class="card">
        <a href="{{ url_for('get_movies', user_id=user.id) }}" class="btn">{{ user.name }}</a>
    </li>
    {% endfor %}
</ul>

<div class="form-section">
    <h2>Add New User</h2>
    <form action="{{ url_for('create_user') }}" method="post">
        <input type="text" name="name" placeholder="User name" required>
        <button type="submit" class="btn">Add User</button>
    </form>
</div>

{% endblock %}
